      role: ""
      flemish_evidence: ""   # quote from excerpt; "" if no tie
      us_evidence: ""        # quote from excerpt; "" if no US presence
      should_extract: true
  notes: ""

- id: extract-002-negative
  # Example of a page where NO contact should be extracted.
  source_url: ""
  excerpt: |
  human_expected_contacts: []   # empty list = "extract nothing"
  notes: "Negative control: page mentions Belgium only in the footer; no person-level tie."
