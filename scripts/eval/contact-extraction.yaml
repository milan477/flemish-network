# the highest-value examples because they teach the model to abstain.
#
# Metric: field-level precision/recall + a hand-judged "would this be
# approved by a reviewer" rate.

- id: extract-001
  source_url: ""
  excerpt: |
    # page text the extractor saw
  human_expected_contacts:
